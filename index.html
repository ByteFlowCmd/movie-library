<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        netflix: {
                            red: '#E50914',
                            dark: '#141414',
                            darker: '#0a0a0a',
                            gray: '#2F2F2F'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'toast-in': 'toastIn 0.3s ease-out',
                        'card-in': 'cardIn 0.4s ease-out both',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(-20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        toastIn: {
                            '0%': { transform: 'translateX(400px)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' }
                        },
                        cardIn: {
                            '0%': { opacity: '0', transform: 'scale(0.92) translateY(12px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-netflix-darker text-white min-h-screen">
    <!-- Header -->
    <header class="bg-netflix-dark shadow-2xl sticky top-0 z-50 border-b border-gray-800">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center space-x-4">
                    <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-netflix-red to-red-600 bg-clip-text text-transparent">
                        🎬 Movie Library
                    </h1>
                </div>

                <div class="flex items-center space-x-4">
                    <!-- Stats -->
                    <div class="flex items-center space-x-4 px-4 py-2 bg-netflix-gray rounded-lg">
                        <div class="text-center">
                            <div id="movieCount" class="text-lg font-bold text-netflix-red">0</div>
                            <div class="text-xs text-gray-400">Movies</div>
                        </div>
                        <div class="w-px h-8 bg-gray-600"></div>
                        <div class="text-center">
                            <div id="tvCount" class="text-lg font-bold text-netflix-red">0</div>
                            <div class="text-xs text-gray-400">TV Shows</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Library View -->
        <div id="libraryView" class="view-content">
            <!-- Library Tabs -->
            <div class="flex space-x-4 mb-6">
                <button id="moviesLibTab" class="library-tab active">
                    Movies <span id="moviesLibCount" class="ml-2 px-2 py-0.5 bg-netflix-red rounded-full text-xs">0</span>
                </button>
                <button id="tvLibTab" class="library-tab">
                    TV Shows <span id="tvLibCount" class="ml-2 px-2 py-0.5 bg-gray-600 rounded-full text-xs">0</span>
                </button>
            </div>

            <!-- Toolbar: Search, Sort, Result count -->
            <div class="viewer-toolbar mb-4">
                <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
                    <!-- Search input -->
                    <div class="relative flex-1">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        <input type="text" id="viewerSearch" placeholder="Search in library..."
                               class="viewer-search-input w-full pl-10 pr-4 py-2.5 bg-netflix-gray border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-netflix-red focus:border-transparent text-sm transition-all duration-200">
                    </div>

                    <!-- Sort select -->
                    <select id="viewerSort" class="viewer-sort-select px-4 py-2.5 bg-netflix-gray border border-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-netflix-red focus:border-transparent transition-all duration-200 cursor-pointer min-w-[180px]">
                        <option value="title-asc">Title (A-Z)</option>
                        <option value="year-desc">Year (Newest)</option>
                        <option value="rating-desc">Rating (Highest)</option>
                    </select>

                    <!-- Visible items count -->
                    <span id="viewerResultCount" class="text-xs text-gray-500 whitespace-nowrap self-center hidden sm:inline"></span>
                </div>
            </div>

            <!-- Genre Filter Tags -->
            <div id="genreFilters" class="flex flex-wrap gap-2 mb-6">
                <!-- Genre tags generated dynamically by viewer.js -->
            </div>

            <!-- Library Grid -->
            <div id="libraryGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                <!-- Library items populated by JS -->
            </div>

            <!-- No results after filtering -->
            <div id="libraryNoResults" class="hidden text-center py-16">
                <div class="text-6xl mb-4 opacity-20">🔍</div>
                <h3 class="text-xl font-semibold mb-1 text-gray-300">No matches found</h3>
                <p class="text-gray-500 text-sm">Try a different search term or clear the filters.</p>
            </div>

            <!-- Library Empty State -->
            <div id="libraryEmpty" class="hidden text-center py-20">
                <div class="text-8xl mb-6 opacity-20">📚</div>
                <h3 class="text-2xl font-semibold mb-2 text-gray-300">Library is Empty</h3>
                <p class="text-gray-500">No movies or TV shows in the collection yet.</p>
            </div>

            <!-- Library Loading -->
            <div id="libraryLoading" class="text-center py-20">
                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-netflix-red mx-auto mb-4"></div>
                <p class="text-gray-400">Loading library...</p>
            </div>
        </div>
    </main>

    <!-- Detail Modal (read-only, no add/remove buttons) -->
    <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center p-4 z-50 hidden overflow-y-auto">
        <div class="bg-netflix-gray rounded-xl max-w-4xl w-full max-h-[90vh] overflow-hidden animate-slide-up my-8">
            <div id="detailModalContent" class="overflow-y-auto max-h-[90vh]">
                <!-- Modal content populated by JS -->
            </div>
        </div>
    </div>

    <!-- Load static data and viewer script -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/viewer.js"></script>
</body>
</html>
